server {
    listen ${HOST}:${PORT};
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 600m;

    # gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;

    # 静态资源长缓存（Vite 生成的带 hash 文件名）
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # BEGIN API PROXY
    # API 代理。前端请求同源 /api-proxy/...，由 Nginx 转发到部署时配置的 API_URL。
    location /api-proxy/ {
        limit_except POST OPTIONS {
            deny all;
        }

        set $allow_proxy 0;
        if ($uri ~* ^/api-proxy/((v1/)?(images/generations|images/edits|responses))$) {
            set $allow_proxy 1;
        }
        if ($allow_proxy = 0) {
            return 403 "Forbidden: API Proxy path restricted";
        }

        set $access_password "${ACCESS_PASSWORD}";
        set $access_denied 0;
        if ($access_password != "") {
            set $access_denied 1;
        }
        if ($http_x_access_password = $access_password) {
            set $access_denied 0;
        }
        if ($access_denied = 1) {
            return 401;
        }

        proxy_pass ${API_URL}/;
        proxy_http_version 1.1;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Access-Password "";
        set $managed_api_key "${MANAGED_API_KEY}";
        set $authorization_header "";
        if ($managed_api_key != "") {
            set $authorization_header "Bearer $managed_api_key";
        }
        proxy_set_header Authorization $authorization_header;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        proxy_request_buffering off;
    }
    # END API PROXY


    location = /auth/status {
        limit_except GET {
            deny all;
        }

        add_header Cache-Control "no-store" always;

        set $access_password "${ACCESS_PASSWORD}";
        if ($access_password = "") {
            return 204;
        }

        return 401;
    }

    location = /auth/verify {
        limit_except POST {
            deny all;
        }

        add_header Cache-Control "no-store" always;

        set $access_password "${ACCESS_PASSWORD}";
        if ($access_password = "") {
            return 204;
        }
        if ($http_x_access_password != $access_password) {
            return 401;
        }

        return 204;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
